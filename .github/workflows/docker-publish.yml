name: Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - chatbot/**
      - frontend/**
      - docker/**
      - .github/workflows/docker-publish.yml
      - backend/requirements.docker.txt
      - docker-compose.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/rag-chatbot-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/rag-chatbot-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/rag-chatbot-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/rag-chatbot-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
